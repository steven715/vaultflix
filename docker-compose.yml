services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set vaultflix http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
      mc mb --ignore-existing vaultflix/${MINIO_VIDEO_BUCKET};
      mc mb --ignore-existing vaultflix/${MINIO_THUMBNAIL_BUCKET};
      echo 'Buckets created successfully';
      "

  migrate:
    image: migrate/migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable",
        "up"
      ]

  vaultflix-api:
    image: golang:1.24-alpine
    working_dir: /app
    command: sh -c "apk add --no-cache curl ffmpeg && go mod tidy && go run ./cmd/server"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      GOTOOLCHAIN: auto
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - go_modules:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
      # 影片來源目錄：將本機路徑掛載到容器的 /mnt/videos，API 的 source_dir 使用容器內路徑
      # 測試：D:\TestVideos:/mnt/videos
      # 全量：D:\AdultsV:/mnt/videos
      - D:\TestVideos:/mnt/videos
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  vaultflix-web:
    build:
      context: ./web
    depends_on:
      vaultflix-api:
        condition: service_healthy
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  test-runner:
    image: alpine:3.20
    profiles: ["test"]
    depends_on:
      vaultflix-api:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts
    entrypoint: sh -c "apk add --no-cache curl jq bash && bash /scripts/test_all.sh"

volumes:
  postgres_data:
  minio_data:
  go_modules:
  go_build_cache:
